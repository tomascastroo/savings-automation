services:
  api:
    build: .
    environment:
      - DATABASE_URL=postgresql+asyncpg://savings:savings@db:5432/savings
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=dev-secret-change-me
      - ALLOWED_ORIGINS=["http://localhost:3000","http://localhost:5173"]
      - PAYMENT_GATEWAY=stripe
      - STORAGE_DIR=/data
    depends_on:
      - db
      - redis
    volumes:
      - data:/data
    ports:
      - "8000:8000"
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=savings
      - POSTGRES_USER=savings
      - POSTGRES_PASSWORD=savings
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U savings -d savings"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
volumes:
  data:
