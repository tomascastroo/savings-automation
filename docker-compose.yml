# docker-compose.yml
services:
  api:
    build: .
    working_dir: /app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - data:/data
    ports:
      - "8010:8000"
    command: >
      sh -lc "alembic upgrade head &&
              uvicorn app.main:app --host 0.0.0.0 --port 8000"

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=savings
      - POSTGRES_USER=savings
      - POSTGRES_PASSWORD=savings
    ports:
      - "5433:5432"
    volumes:
      - "postgres_data:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U savings -d savings"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  data:
  postgres_data: